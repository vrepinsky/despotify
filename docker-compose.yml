services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: despotify
      POSTGRES_USER: despotify
      POSTGRES_PASSWORD: despotify
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U despotify -d despotify"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      WEB_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - api-node-modules:/workspace/node_modules
      - api-app-node-modules:/workspace/apps/api/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm --filter @despotify/api dev"

  web:
    image: node:22-alpine
    working_dir: /workspace
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/node_modules
      - web-app-node-modules:/workspace/apps/web/node_modules
    command: sh -c "corepack enable && pnpm install && pnpm --filter @despotify/web dev --host 0.0.0.0"

volumes:
  postgres-data:
  api-node-modules:
  api-app-node-modules:
  web-node-modules:
  web-app-node-modules:
